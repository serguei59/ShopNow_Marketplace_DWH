      - "Configuration RLS": 11_powerbi/RLS_configuration.md
  - 12. Validation E6:
      - "Grille C16/C17": 12_validation_E6/grille_C16_C17.md
      - "Correspondance: situations ↔ compétences": 12_validation_E6/correspondance_situations_competences.md
