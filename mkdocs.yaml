  - 13. Annexes:
      - Glossaire: 13_annexes/glossaire.md
      - Jeux de données: 13_annexes/jeux_donnees.md
      - Exemples de code: 13_annexes/exemples_code.md
      - Références: 13_annexes/references.md

theme:
  name: material
  language: fr
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - admonition
  - footnotes
  - codehilite
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.tasklist
  - pymdownx.arithmatex
  - pymdownx.emoji
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/serguei59/ShopNow_Marketplace_DWH"
